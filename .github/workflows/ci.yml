name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Lint + Typecheck + Test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black flake8 mypy pytest pytest-cov

      - name: Set PYTHONPATH
        shell: bash
        run: echo "PYTHONPATH=${PYTHONPATH};${GITHUB_WORKSPACE}/src" >> $GITHUB_ENV

      - name: Check formatting with black
        shell: bash
        run: black --check .

      - name: Type check with mypy
        shell: bash
        run: mypy --ignore-missing-imports --explicit-package-bases scripts tests

      - name: Run unit tests
        shell: bash
        run: pytest --tb=short --disable-warnings

      - name: Check code coverage
        shell: bash
        run: pytest --cov=scripts --cov-report=term-missing

  export_onnx:
    name: Export ONNX + Test Vectors
    runs-on: windows-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal deps for export
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install onnx onnxruntime
          # CPU Torch for Windows:
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Export model.onnx + model_config.json + test_vectors.npz
        shell: bash
        run: |
          set -e
          mkdir -p artifacts
          if [ -f scripts/verify_onnx.py ]; then
            python scripts/verify_onnx.py --out artifacts/model.onnx --vectors artifacts/test_vectors.npz --model-config artifacts/model_config.json || true
          fi
          # Fallback exporter (uses train/exporter.py if present)
          if [ ! -f artifacts/model.onnx ]; then
            python - <<'PY'
import os, json, torch
try:
    from train.unet3d import UNet3D, UNet3DConfig
    from train.exporter import export_static_onnx
    cfg = UNet3DConfig()
    model = UNet3D(cfg)
    os.makedirs("artifacts", exist_ok=True)
    export_static_onnx(model, "artifacts/model.onnx", torch.device("cpu"))
    with open("artifacts/model_config.json","w") as f:
        json.dump({"inputs":[
          {"name":"parent_voxel","shape":[1,1,8,8,8],"dtype":"float32"},
          {"name":"biome_patch","shape":[1,16,16],"dtype":"int64"},
          {"name":"heightmap_patch","shape":[1,1,16,16],"dtype":"float32"},
          {"name":"river_patch","shape":[1,1,16,16],"dtype":"float32"},
          {"name":"y_index","shape":[1],"dtype":"int64"},
          {"name":"lod","shape":[1],"dtype":"int64"}
        ],"outputs":[
          {"name":"block_logits","shape":[1,1104,16,16,16],"dtype":"float32"},
          {"name":"air_mask","shape":[1,1,16,16,16],"dtype":"float32"}
        ]}, f, indent=2)
except Exception as e:
    raise SystemExit(e)
PY
          fi
          # Seed a basic input pack if your script didn’t make one
          if [ ! -f artifacts/test_vectors.npz ]; then
            python - <<'PY'
import numpy as np
np.savez("artifacts/test_vectors.npz",
  parent_voxel=np.zeros((1,1,8,8,8), np.float32),
  biome_patch=np.zeros((1,16,16), np.int64),
  heightmap_patch=np.zeros((1,1,16,16), np.float32),
  river_patch=np.zeros((1,1,16,16), np.float32),
  y_index=np.zeros((1,), np.int64),
  lod=np.ones((1,), np.int64))
PY
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voxeltree-artifacts
          path: artifacts/

  djl_verify:
    name: DJL ONNX Runtime Verification
    runs-on: windows-latest
    needs: export_onnx
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: voxeltree-artifacts
          path: artifacts

      - name: Set up Java (Temurin 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'maven'

      - name: Build tiny DJL harness (Maven) & run
        shell: bash
        run: |
          set -e
          mkdir -p ci-djl/src/main/java/vt
          cat > ci-djl/pom.xml <<'POM'
<project xmlns="http://maven.apache.org/POM/4.0.0"  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
  xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 https://maven.apache.org/xsd/maven-4.0.0.xsd">
  <modelVersion>4.0.0</modelVersion>
  <groupId>vt</groupId><artifactId>djl-verify</artifactId><version>1.0</version>
  <dependencies>
    <dependency><groupId>ai.djl</groupId><artifactId>api</artifactId><version>0.27.0</version></dependency>
    <dependency><groupId>ai.djl.onnxruntime</groupId><artifactId>onnxruntime-engine</artifactId><version>0.27.0</version></dependency>
    <dependency><groupId>ai.djl.onnxruntime</groupId><artifactId>onnxruntime-native-auto</artifactId><version>1.16.3</version></dependency>
    <dependency><groupId>com.fasterxml.jackson.core</groupId><artifactId>jackson-databind</artifactId><version>2.17.2</version></dependency>
  </dependencies>
  <build>
    <plugins>
      <plugin><groupId>org.apache.maven.plugins</groupId><artifactId>maven-compiler-plugin</artifactId><version>3.11.0</version>
        <configuration><source>21</source><target>21</target></configuration></plugin>
      <plugin><groupId>org.apache.maven.plugins</groupId><artifactId>maven-dependency-plugin</artifactId><version>3.6.1</version></plugin>
    </plugins>
  </build>
</project>
POM
          cat > ci-djl/src/main/java/vt/DjlVerify.java <<'JAVA'
package vt;
import ai.djl.Device; import ai.djl.Model; import ai.djl.inference.Predictor;
import ai.djl.modality.nlp.translator.NoopTranslator; import ai.djl.ndarray.*;
import ai.djl.ndarray.types.DataType; import com.fasterxml.jackson.databind.*;
import java.nio.file.*; import java.util.*; import java.io.*;
public class DjlVerify {
  public static void main(String[] args) throws Exception {
    Path art = Paths.get("artifacts"); Path onnx = art.resolve("model.onnx");
    if (!Files.exists(onnx)) throw new FileNotFoundException("model.onnx missing");
    // Load simple JSON packs if present
    Path npz = art.resolve("test_vectors.npz"); // not parsed here (optional)
    try (Model m = Model.newInstance("voxeltree", Device.cpu());
         NDManager man = NDManager.newBaseManager();
         Predictor<NDList, NDList> p = m.newPredictor(new NoopTranslator())) {
      m.load(onnx, null);
      // Build zeroed inputs by name (match model_config if present; else standard order)
      String[] names = new String[]{"parent_voxel","biome_patch","heightmap_patch","river_patch","y_index","lod"};
      NDList in = new NDList();
      in.add(man.create(new float[1*1*8*8*8]).reshape(1,1,8,8,8));
      in.add(man.create(new long[1*16*16]).reshape(1,16,16));
      in.add(man.create(new float[1*1*16*16]).reshape(1,1,16,16));
      in.add(man.create(new float[1*1*16*16]).reshape(1,1,16,16));
      in.add(man.create(new long[1]).reshape(1));
      in.add(man.create(new long[1]).reshape(1));
      NDList out = p.predict(in);
      // Basic sanity: two outputs with expected ranks
      if (out.size() < 2) throw new RuntimeException("Expected 2 outputs, got "+out.size());
      if (out.get(0).getShape().dimension() != 5) throw new RuntimeException("block_logits rank != 5");
      if (out.get(1).getShape().dimension() != 5) throw new RuntimeException("air_mask rank != 5");
      System.out.println("DJL inference OK. Shapes: "+out.get(0).getShape()+" ; "+out.get(1).getShape());
    }
  }
}
JAVA
          pushd ci-djl
          mvn -q -DskipTests package
          mvn -q -DskipTests dependency:copy-dependencies -DoutputDirectory=target/dependency
          java -cp "target/classes;target/dependency/*" vt.DjlVerify
          popd
