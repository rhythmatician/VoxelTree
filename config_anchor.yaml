# Anchor-channel training config (Phase 2)
# Now uses SEPARATE models per LOD step — no x_lod conditioning
# LOD0 DROPPED: vanilla terrain handles full-resolution
# Dropped channels: x_cave_prior4, x_aquifer3, x_barrier (too expensive)
# Contract: lodiffusion.v2

model:
  base_channels: 32
  biome_vocab_size: 256
  block_type_channels: 1104
  # Anchor conditioning dimensions
  height_channels: 5
  router6_channels: 6
  biome_embed_dim: 32
  y_embed_dim: 16
  # Depth (3+1 block-down stages)
  num_res_blocks: 2
  # Separate models per step
  separate_models: true

training:
  epochs: 100
  batch_size: 4
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  lr_schedule: cosine # CosineAnnealingLR(T_max=epochs)
  # Loss weights
  air_loss_weight: 0.25
  surface_consistency_weight: 0.10 # L1 of predicted top surface vs height_planes[0]
  # LOD sampling bias — LOD0 DROPPED, favour mid-range transitions
  lod_sampling_weights:
    init_to_lod4: 0.15
    lod4to3: 0.25
    lod3to2: 0.30
    lod2to1: 0.30
    # lod1to0: DROPPED — vanilla handles LOD0
  # Checkpointing
  save_every: 10
  validate_every: 5

data:
  # NPZ keys expected from NoiseDumper extraction (fall back to approximation when absent)
  anchor_keys:
    router6: router6 # float32 [6, 16, 16] — 6 CORE router channels
    heightmap_surface: hmap_surf # float32 [16, 16]    — WORLD_SURFACE_WG
    heightmap_ocean_floor: hmap_ocean # float32 [16, 16]
    slope_x: slope_x # float32 [16, 16]    — optional, derived if absent
    slope_z: slope_z # float32 [16, 16]
    curvature: curvature # float32 [16, 16]

export:
  contract: "lodiffusion.v2"
  opset: 17
  separate_models: true
  # Per-step shapes — no x_lod needed (separate models)
  # Shared inputs across all models:
  shared_inputs:
    x_height_planes: [1, 5, 16, 16]
    x_router6: [1, 6, 16, 16]
    x_biome: [1, 16, 16] # int64 biome index
    x_y_index: [1] # int64
  # Per-model parent shapes:
  models:
    - name: init_to_lod4
      x_parent: [1, 1, 1, 1, 1]
      output_d: 1
    - name: refine_lod4_to_lod3
      x_parent: [1, 1, 1, 1, 1]
      output_d: 2
    - name: refine_lod3_to_lod2
      x_parent: [1, 1, 2, 2, 2]
      output_d: 4
    - name: refine_lod2_to_lod1
      x_parent: [1, 1, 4, 4, 4]
      output_d: 8
  # Dropped: x_lod (separate models handle one step each)
  # Dropped: x_cave_prior4, x_aquifer3, x_barrier (too expensive for distant LOD)
  outputs:
    block_logits: [1, 1104, D, D, D] # D varies per model
    air_mask: [1, 1, D, D, D]
