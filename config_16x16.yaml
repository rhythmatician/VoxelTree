# VoxelTree Configuration - 16x16 Chunk-Aligned Training
# Complete configuration for training with proper Minecraft chunk dimensions

# World generation
worldgen:
  seed: "VoxelTree16x16"
  java_heap: "6G"
  batch_size: 32
  max_temp_disk_gb: 15
  generate_structures: false
  chunk_region_bounds:
    x_min: 0
    x_max: 64
    z_min: 0
    z_max: 64
  java_tools:
    primary: "tools/fabric-server/fabric-server-mc.1.21.5-loader.0.16.14-launcher.1.0.3.jar"
    chunky: "tools/fabric-server/runtime/mods/Chunky-Fabric-1.4.36.jar"
    cubiomes: "tools/voxeltree_cubiomes_cli/voxeltree_cubiomes_cli.exe"

# Corpus generation
corpus:
  seed_ranges: "1000-1010"
  world_radius: 4
  output_dir: "data/corpus"
  splits:
    train: 0.8
    val: 0.1
    test: 0.1
  cleanup:
    delete_temp_worlds: true
    delete_raw_chunks: true
    max_disk_usage_gb: 50

# Extraction configuration
extraction:
  output_dir: "data/chunks"
  temp_dir: "temp_extraction"
  max_disk_usage_gb: 15
  batch_size: 64
  num_workers: 4
  compression_level: 6
  validation:
    verify_checksums: true
    detect_corruption: true
  block_mapping:
    air_blocks: [0]
    solid_blocks: [1, 2, 3]
  heightmap:
    surface_blocks: [2, 3, 4]
    min_height: -64
    max_height: 320

# Training configuration
training:
  batch_size: 4
  learning_rate: 1e-4
  epochs: 10
  device: "cuda"
  save_every: 5
  checkpoint_dir: "runs"
  weight_decay: 1e-5
  cleanup:
    enable: true
  scheduler:
    type: "cosine"
    warmup_epochs: 2
    min_lr: 0.00001
  tensorboard:
    enabled: true
    log_dir: "runs/tensorboard"
    log_model_graph: true
    log_visualizations: true
    visualization_samples: 4

# Data configuration
data:
  chunk_format: "npz"
  max_chunks_in_memory: 1000
  temp_data_dir: "data/temp"
  processed_data_dir: "data/processed"
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

# Model architecture (16x16 chunk-aligned)
model:
  input_channels: 1
  output_channels: 2
  base_channels: 64
  depth: 2
  biome_vocab_size: 256
  biome_embed_dim: 16
  heightmap_channels: 1
  river_channels: 1
  y_embed_dim: 8
  lod_embed_dim: 32
  dropout_rate: 0.1
  use_batch_norm: true
  activation: "gelu"
  air_mask_channels: 1
  block_type_channels: 1104

# Loss function configuration
loss:
  mask_weight: 1.0
  type_weight: 1.0

# Seed-based input generation
seed_inputs:
  output_dir: "data/seed_inputs"
  default_patch_size: 16
  biome_source: "vanilla"
  resolution: 4
  noise_parameters:
    height_scale: 0.01
    river_scale: 0.005
  height_parameters:
    base_height: 64
    height_variation: 60
    min_height: 0
    max_height: 384
  vanilla_biome:
    java_tool: "tools/amidst-cli.jar"
    fallback_tool: "tools/cubeseed.jar"
    cache_dir: "data/biome_cache"
    chunk_batch_size: 64

# Pairing configuration
pairing:
  extracted_data_dir: "data/chunks"
  seed_inputs_dir: "data/seed_inputs"
  output_dir: "data/pairs"
  lod_levels: 4
  pair_format:
    parent_shape: [8, 8, 8]
    target_shape: [16, 16, 16]
    compression_level: 6
  validation:
    validate_alignment: true
    detect_corruption: true
  batch_processing:
    chunk_batch_size: 32
    num_workers: 4
    max_memory_gb: 8

# ONNX Export configuration
export:
  opset_version: 17
  dynamic_axes: false
  optimize: true
