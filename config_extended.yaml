# Extended VoxelTree Configuration: Multi-LOD Training & Evaluation
# This extends the base config.yaml with Item 2-8 features from acceptance criteria

# World generation (required base section)
worldgen:
  seed: "VoxelTree16x16"
  java_heap: "6G"
  batch_size: 32
  max_temp_disk_gb: 15
  generate_structures: false
  chunk_region_bounds:
    x_min: 0
    x_max: 64  # Smaller for quick training
    z_min: 0
    z_max: 64
  java_tools:
    primary: "tools/fabric-server/fabric-server-mc.1.21.5-loader.0.16.14-launcher.1.0.3.jar"
    chunky: "tools/fabric-server/runtime/mods/Chunky-Fabric-1.4.36.jar"
    cubiomes: "tools/voxeltree_cubiomes_cli/voxeltree_cubiomes_cli.exe"

# Corpus generation
corpus:
  seed_ranges: "1000-1010"  # Smaller range for quick training
  world_radius: 4  # Small radius for quick testing
  output_dir: "data/corpus"
  splits:
    train: 0.8
    val: 0.1
    test: 0.1
  cleanup:
    delete_temp_worlds: true
    delete_raw_chunks: true
    max_disk_usage_gb: 50

# Extraction configuration  
extraction:
  output_dir: "data/chunks"
  temp_dir: "temp_extraction"
  max_disk_usage_gb: 15
  batch_size: 64
  num_workers: 4
  compression_level: 6
  validation:
    verify_checksums: true
    detect_corruption: true
  block_mapping:
    air_blocks: [0]
    solid_blocks: [1, 2, 3]
  heightmap:
    surface_blocks: [2, 3, 4]
    min_height: -64
    max_height: 320

training:
  # Base training settings (inherit from config.yaml)
  epochs: 50
  batch_size: 8
  learning_rate: 1e-4
  weight_decay: 1e-5

  # Multi-LOD training (Item 2: LOD pyramid & coarsening)
  multi_lod:
    enabled: true
    factors: [1, 2, 4, 8, 16] # Coarsening factors for parent generation
    # Each factor f creates parent via f×f×f max pooling then resize to 8³

  # Scheduled sampling (Item 3: reduce teacher forcing over time)
  scheduled_sampling:
    enabled: true
    start_prob: 0.0 # Initial probability of using model prediction
    end_prob: 0.3 # Final probability after ramp
    warmup_epochs: 5 # Epochs before sampling starts
    total_epochs: 50 # Total training epochs for scheduling

  # Cleanup management
  cleanup:
    enable: true

# Item 4: Metrics & Evaluation Harness
evaluation:
  enabled: true
  # Confusion matrix analysis frequency
  confusion_analysis:
    enabled: true
    frequency: 5 # Every 5 epochs
    save_detailed: true
    accuracy_threshold: 0.99 # 99% goal

  # IoU and surface accuracy metrics
  metrics:
    iou:
      enabled: true
      compute_per_lod: true
    surface_accuracy:
      enabled: true
      boundary_width: 1
    frequent_set_accuracy:
      enabled: true
      top_k_blocks: 50 # Most common blocks

  # Rollout evaluation (chain multiple LOD steps)
  rollout:
    enabled: true
    max_steps: 4 # 8³ -> 16³ -> 32³ -> 64³ -> 128³
    seeds: [42, 1337, 9999] # Test seeds for rollout

# Item 5: Determinism & DJL Parity Testing
testing:
  determinism:
    enabled: true
    repeat_runs: 3
    max_diff_threshold: 1e-4
    seeds: [12345, 67890]

  djl_parity:
    enabled: true
    test_vectors_path: "production/test_vectors.npz"
    max_abs_diff: 1e-4
    timeout_seconds: 30

# Item 6: Performance Benchmarking
benchmarking:
  enabled: true
  cpu_latency:
    enabled: true
    warmup_iterations: 10
    measurement_iterations: 100
    input_shapes:
      - [1, 1, 8, 8, 8] # Standard LOD input
  memory_profiling:
    enabled: true
    baseline_measurement: true
    peak_memory_tracking: true

# Item 7: Enhanced Provenance & Artifact Enrichment
provenance:
  git_tracking: true
  dataset_fingerprinting: true
  config_hashing: true
  seed_logging: true
  block_mapping_embedding: true # Embed complete_block_mapping.json

# Item 8: CI & Automation Enhancements
ci:
  json_schema_validation: true
  evaluation_on_commit: true
  performance_regression_detection: true
  artifact_archival: true

# TensorBoard enhanced logging
tensorboard:
  enabled: true
  log_dir: "runs/multi_lod_training"
  log_model_graph: true
  log_visualizations: true
  visualization_samples: 4
  log_confusion_matrices: true
  log_rollout_chains: true

# Model architecture (inherit base settings, add multi-LOD specific)
model:
  # Base UNet3D settings from config.yaml
  input_channels: 1
  base_channels: 64
  depth: 2
  biome_vocab_size: 256
  biome_embed_dim: 16
  heightmap_channels: 1
  river_channels: 1
  y_embed_dim: 8
  lod_embed_dim: 32
  dropout_rate: 0.1
  use_batch_norm: true
  activation: "gelu"
  air_mask_channels: 1
  block_type_channels: 1104

  # Multi-LOD specific model enhancements
  enhanced_lod_conditioning: true
  sinusoidal_lod_embedding: true
  film_conditioning_layers: true

# Data loading (inherit base paths)
data:
  train_dir: "data/processed"
  val_dir: "data/processed"
  test_dir: "data/test_world"

  # Multi-LOD data augmentation
  augmentation:
    enabled: true
    random_lod_sampling: true
    parent_noise_injection: 0.05 # Small noise for robustness

# Loss function configuration
loss:
  mask_weight: 1.0
  type_weight: 1.0
  # Potential future: LOD-aware loss weighting
  lod_adaptive_weighting: false

# Export configuration for LODiffusion contract
export:
  production_dir: "production"
  include_provenance: true
  include_test_vectors: true
  embed_block_mapping: true
  contract_validation: true

# Data configuration (required)
data:
  chunk_format: "npz"
  max_chunks_in_memory: 1000
  temp_data_dir: "data/temp"
  processed_data_dir: "data/processed"
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

# Seed-based input generation
seed_inputs:
  output_dir: "data/seed_inputs"
  default_patch_size: 16
  biome_source: "vanilla"
  resolution: 4
  noise_parameters:
    height_scale: 0.01
    river_scale: 0.005
  height_parameters:
    base_height: 64
    height_variation: 60
    min_height: 0
    max_height: 384
  vanilla_biome:
    java_tool: "tools/amidst-cli.jar"
    fallback_tool: "tools/cubeseed.jar"
    cache_dir: "data/biome_cache"
    chunk_batch_size: 64

# Pairing configuration
pairing:
  extracted_data_dir: "data/chunks"
  seed_inputs_dir: "data/seed_inputs"
  output_dir: "data/pairs"
  lod_levels: 4
  pair_format:
    parent_shape: [8, 8, 8]
    target_shape: [16, 16, 16]
    compression_level: 6
  validation:
    validate_alignment: true
    detect_corruption: true
  batch_processing:
    chunk_batch_size: 32
    num_workers: 4
    max_memory_gb: 8

# Loss configuration
loss:
  mask_weight: 1.0
  type_weight: 0.5
