name: phase5
description: >-
  Phase 5 training — geometric pruning in training.
  Full-scale data harvest (1.1M noise dumps) + retrain with pruning_boost=4.0.

dag:
  steps:
    - id: harvest
    - id: extract_octree
    - id: build_v7_pairs
    - id: train_sparse_octree
    - id: export_sparse_octree
    - id: deploy_sparse_octree

world:
  radius: 2048 # blocks — covers dump range X:[-2048,879] Z:[-2048,2143]

data:
  data_dir: data/voxy_octree
  v7_dumps_dir: tools/fabric-server/runtime/sparse_root_dumps
  v7_pairs_npz: noise_training_data/sparse_octree_pairs_v7.npz
  val_split: 0.1
  max_sections: null
  min_solid: 0.02

train:
  output_dir: models/phase5
  batch_size: 8
  device: auto
  epochs: 800
  lr: 0.0001
  sparse_octree_hidden: 80
  sparse_octree_variant: fast
  num_classes: 1104
  pruning_boost: 4.0

export:
  output_dir: production/phase5

deploy:
  target_dir: ../LODiffusion/run/config/lodiffusion

rcon:
  timeout: 3600
