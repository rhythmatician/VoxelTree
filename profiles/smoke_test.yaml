dag:
  steps:
  - id: pregen
  - id: harvest
  - id: dumpnoise
  - id: extract_octree
  - id: build_v7_pairs
  - id: build_pairs_sparse_octree
  - id: train_sparse_octree
  - id: export_sparse_octree
  - id: deploy_sparse_octree
  - id: build_pairs_density
  - id: train_density
  - id: export_density
  - id: deploy_density
  - id: build_pairs_biome_classifier
  - id: train_biome_classifier
  - id: export_biome_classifier
  - id: deploy_biome_classifier
  - id: build_pairs_heightmap_predictor
  - id: train_heightmap_predictor
  - id: export_heightmap_predictor
  - id: deploy_heightmap_predictor
data:
  data_dir: data/voxy_octree
  max_sections: null
  min_solid: 0.02
  v7_dumps_dir: data/v7_dumps_smoke
  v7_pairs_npz: sparse_octree_pairs_v7_smoke.npz
  val_split: 0.093
  voxy_dir: ../LODiffusion/run/saves
deploy:
  target_dir: ../LODiffusion/run/config/lodiffusion
description: Smoke test — tiny dataset, minimum epochs, verifies that all four v7
  models (density, biome_classifier, heightmap_predictor, sparse_octree_v7) can be
  trained and exported end-to-end.  Use the "train" world role in the server status
  bar.  Not intended for production-quality model weights.
export:
  output_dir: production/smoke_test
name: smoke_test
rcon:
  timeout: 1800
train:
  batch_size: 4
  device: auto
  epochs: 2
  lr: 0.0001
  max_samples: null
  output_dir: models/smoke_test
  sparse_octree_hidden: 32
  sparse_octree_variant: fast
  target_mse: 0.001
