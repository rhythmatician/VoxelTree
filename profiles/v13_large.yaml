dag:
  steps:
    - id: pregen
    - id: harvest
    - id: dumpnoise
    - id: extract_octree
    - id: column_heights
    - id: build_pairs_sparse_root
    - id: train_sparse_root
    - id: export_sparse_root
    - id: deploy_sparse_root
    - id: distill_sparse_root
    - id: build_pairs_stage1
    - id: train_stage1_density
    - id: extract_stage1_weights
    - id: deploy_stage1
    - id: distill_density
    - id: train_terrain_shaper
data:
  data_dir: data/voxy_octree
  max_sections: null
  min_solid: 0.02
  noise_dump_dir: tools/fabric-server/runtime/noise_dumps
  val_split: 0.1
  voxy_dir: None
deploy:
  target_dir: ../LODiffusion/run/config/lodiffusion
description:
  Large-area training profile (radius 4096 blocks, 512×512 chunks). Generates
  ~6.3 M (noise, voxy) section pairs — 4× the coverage of v12.
export:
  output_dir: production/v13_large
name: v13_large
server_role: train
rcon:
  timeout: 3600
train:
  batch_size: 16
  device: auto
  epochs: 30
  lr: 0.0001
  max_samples: null
  output_dir: models/v13_large
  target_mse: 0.0008
