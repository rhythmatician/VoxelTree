dag:
  steps:
  - id: pregen
  - id: voxy_import
  - id: dumpnoise
    prereqs: []
  - id: train_stage1_density
  - id: extract_stage1_weights
  - id: distill_density
    prereqs:
    - train_stage1_density
  - id: extract_octree
  - id: build_pairs_init
    prereqs:
    - column_heights
    - dumpnoise
    - extract_octree
  - id: build_pairs_refine
    prereqs:
    - column_heights
    - dumpnoise
    - extract_octree
  - id: build_pairs_leaf
    prereqs:
    - column_heights
    - dumpnoise
    - extract_octree
  - id: train_init
  - id: train_refine
  - id: train_leaf
  - id: export_init
  - id: export_refine
  - id: export_leaf
  - id: deploy_init
  - id: deploy_refine
  - id: deploy_leaf
data:
  data_dir: VoxelTree/data/voxy_octree
  max_sections: null
  min_solid: 0.003
  stage1_dump_dir: tools/fabric-server/runtime/stage1_dumps
  val_split: 0.104
  voxy_dir: ../LODiffusion/run/saves
deploy:
  files:
  - stage1_mlp_weights.bin
  - stage1_norm_mean.bin
  - stage1_norm_std.bin
  - stage1_mlp.onnx
  target_dir: ../LODiffusion/src/main/resources/assets/lodiffusion/models
description: Stage 1 density MLP — 12→64→64→1, predicts finalDensity from 12 noise
  features
distill:
  alpha: 0.5
  epochs: 120
  lr: 0.002
  student: sep
  teacher: unet
dump:
  command: /dumpnoise stage1 64
  expected_chunks: 16641
  samples_per_chunk: 768
export:
  formats:
  - pt
  - onnx
  - bin
  output_dir: production/stage1_v1
name: stage1_density
rcon:
  timeout: 575
train:
  batch_size: 512
  device: auto
  epochs: 5000
  lr: 0.001
  max_samples: null
  output_dir: stage1_model/v1
  target_mse: 0.0005
world:
  radius: 64
  save_name: stage1_world
  seed: 999999
