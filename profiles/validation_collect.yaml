name: validation_collect
description: Validation-world data collection profile for server-backed acquisition steps.

dag:
  steps:
    - id: pregen
    - id: harvest
    - id: dumpnoise
    - id: import_voxy

data:
  data_dir: data/voxy_octree
  voxy_dir: null
  max_sections: null
  min_solid: 0.02
  val_split: 0.1
  noise_dump_dir: tools/fabric-server/runtime/noise_dumps
  v7_dumps_dir: tools/fabric-server/runtime/sparse_root_dumps
  v7_dumps_db: tools/fabric-server/runtime/v7_dumps.db
  v7_pairs_npz: noise_training_data/sparse_octree_pairs_v7.npz
  v7_pairs_db: noise_training_data/sparse_octree_pairs_v7.db

world:
  name: validate
  radius: 256

rcon:
  timeout: 7200

train:
  output_dir: models/validation_collect
  max_samples: null
  epochs: 20
  batch_size: 8
  lr: 0.0001
  target_mse: 0.001
  device: auto

export:
  output_dir: production/validation_collect

deploy:
  target_dir: ../LODiffusion/run/config/lodiffusion
