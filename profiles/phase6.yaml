name: phase6
description: >-
  Phase 6 — v2 architecture with v7 15-channel noise + heightmaps.
  Requires re-dumping training data with /dumpnoise v7 command.

dag:
  steps:
    - id: build_v7_pairs
    - id: train_sparse_octree
    - id: export_sparse_octree
    - id: deploy_sparse_octree

world:
  radius: 2048

data:
  data_dir: data/voxy_octree
  v7_dumps_dir: tools/fabric-server/runtime/v7_dumps
  v7_pairs_npz: noise_training_data/sparse_octree_pairs_v7.npz
  val_split: 0.1
  max_sections: null
  min_solid: 0.02

train:
  output_dir: models/phase6
  batch_size: 8
  device: auto
  epochs: 400
  lr: 0.001
  sparse_octree_hidden: 160
  sparse_octree_variant: v2
  num_classes: 1104
  pruning_boost: 4.0

export:
  output_dir: production/phase6

deploy:
  target_dir: ../LODiffusion/run/config/lodiffusion

rcon:
  timeout: 3600
